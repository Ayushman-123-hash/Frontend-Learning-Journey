<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .border {
            border: 4px solid black;
            height: 145.8vh;
            margin: 44px;
        }

        header {
            position: sticky;
            top: 0;
        }

        nav {
            background-color: pink;
            height: 90px;
        }

        main {
            background-color: black;
            color: white;
            height: 705px;
        }

        .div {
            background-color: black;
            color: black;
            height: 22px;
        }

        .container {
            background-color: green;
            margin: 12px 34px;
            margin-top: 0;
            height: 580px;
            display: flex;
            align-items: center;
        }

        .box {
            display: flex;
            padding: 22px;
            margin: 33px;
            height: 70vh;
            width: 40.5%;
        }

        .box1 {
            background-color: palevioletred;
            display: inline-block;
        }

        .box2 {
            background-color: blue;
            display: inline-block;
        }

        .text-box {
            padding: 28.8px;
            border: 2px solid white;
            border-radius: 55px;
            margin-top: 0;
            margin-bottom: 0;
            display: flex;
            justify-content: center;
            align-content: center;
            margin-inline: 400px;
        }

        .fixed-box {
            background-color: orange;
            border-radius: 22px;
            height: 32px;
            width: 32px;
            position: fixed;
            bottom: 55px;
            right: 55px;
        }

        footer {
            background-color: blueviolet;
            height: 90px;
        }
    </style>
</head>

<body>
    <div class="border">
        <header>
            <nav>

            </nav>
        </header>

        <main>
            <div class="div">
                <p>hbjsfhd</p>
            </div>
            <div class="container">
                <div class=" box box1"></div>
                <div class=" box box2"></div>
            </div>

            <div class="text-box">
                <p>WELCOME TO WEB DEVELOPMENT EXPRESS</p>
            </div>

            <div class="fixed-box">

            </div>
        </main>

        <footer>

        </footer>
    </div>
</body>

</html>
