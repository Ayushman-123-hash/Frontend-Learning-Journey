<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API</title>
</head>

<body>
    <form id="myForm">
        Title <input type="text" id="titleText"> <br><br>
        Body <input type="text" id="bodyText"> <br><br>
        UserId <input type="text" id="userid"> <br><br>
        <input type="submit" id="saveForm">
    </form>
    <script>

        // Fake API for testing and prototyping: https://jsonplaceholder.typicode.com/
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(response => response.json())
            .then(data => {
                console.log(data);

                // for (var x in data) {  // there are two ways to print the data, one is using + and the other is using template literals
                //     console.log(data[x].name + " - " + data[x].email + " - " + data[x].phone + "<br>")
                //     console.log(`${data[x].name} - ${data[x].email} - ${data[x].phone} <br>`)
                // }
            })
            .catch(error => console.log(error));

        // I made a json file for testing and prototyping: fetch('fetch_API.json')    
        fetch('fetch_API.json')
            .then((response) => response.json())
            .then((data) => {
                console.log(data);

                for (var y in data) {
                    console.log(data[y].name + " - " + data[y].age + " - " + data[y].city + ' <br>')
                    console.log(`${data[y].name} ${data[y].age} ${data[y].city} <br>`)
                }
            })
            .catch(error => console.log(error));


        // How to save Data in server using some Methods like POST, PUT, PATCH, DELETE , GET.
        // POST :- means Insert data in server
        // PUT :- means Update data in server
        // PATCH :- means Update data in server but only specific data
        // DELETE :- means Delete data in server
        // GET :- means Read data from server and GET is default method in fetch API 

        // How to write fetch API for POST, PUT, PATCH, DELETE , GET method

        //  fetch(file/Url,{
        //     method:"POST",
        //     body:data, ------> Form Data / JSON Data / Text Data
        //     header:{
        //         "Content-Type":"application/json"  // for JSON Data
        //         "Content-Type":"application/x-www-form-urlencoded"  // for Form Data
        //         "Content-Type":"text/plain"  // for Text Data
        //     }
        //  }) 

        // Example of GET method:-
        fetch("https://jsonplaceholder.typicode.com/posts")
            .then(res => res.json())
            .then(data => console.log(data))
            .catch(err => console.log(err));

        // Example of POST method:-

        // example 1: using Form Data
        document.getElementById("saveForm").addEventListener("click", (e) => {
            e.preventDefault();  // to prevent the default behavior of the form which is to reload the page

            // var data = {                                             // for JSON Data
            //         title: document.getElementById("titleText").value,
            //         body: document.getElementById("bodyText").value,
            //         userId: document.getElementById("userid").value,
            //     }

            fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                // body: JSON.stringify(data), // for JSON Data
                body: new FormData(document.getElementById("myForm")),  // for Form Data
            })
                .then((response) => response.json())
                .then((data) => console.log(data))
                .catch((error) => console.log(error));

        });

        // example 2: using JSON Data
        fetch("https://jsonplaceholder.typicode.com/posts", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: "Hello",
                body: "Bhai POST kar diya",
                userId: 1
            })
        })
            .then(res => res.json())
            .then(data => console.log(data))
            .catch(err => console.log(err));

        // Example of PUT method:- (Full update)
        fetch("https://jsonplaceholder.typicode.com/posts/1", {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id: 1,
                title: "Updated Title",
                body: "Full update",
                userId: 1
            })
        })
            .then(res => res.json())
            .then(data => console.log(data))
            .catch(error => console.log(error));

        // Example of PATCH method:- (Partial update)
        fetch("https://jsonplaceholder.typicode.com/posts/1", {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: "Only title updated"
            })
        })
            .then(res => res.json())
            .then(data => console.log(data))
            .catch(error => console.log(error));

        // Example of DELETED method:-
        fetch("https://jsonplaceholder.typicode.com/posts/1", {
            method: "DELETE"
        })
            .then(res => console.log("Deleted"))
            .catch(err => console.log(err));




    </script>
</body>

</html>
