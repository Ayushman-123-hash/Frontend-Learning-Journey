<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling</title>
    <style>
        .child {
            background-color: rgb(145, 204, 255);
            border: 2px solid black;
            padding: 14px;
            margin: 14px;
            cursor: pointer;
        }

        .childContainer {
            background-color: rgb(247, 247, 148);
            padding: 14px;
            margin: 14px;
        }

        .container {
            background-color: rgb(153, 153, 0);
            padding: 14px;
            margin: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="childContainer">
            <div class="child">I am a Child</div>
        </div>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click", (e) => {
            alert("Child Was Clicked")
            e.stopPropagation()
        })

        document.querySelector(".childContainer").addEventListener("click", () => {
            alert("Child Container Was Clicked")
        })

        document.querySelector(".container").addEventListener("click", () => {
            alert("Container Was Clicked")
        })

        document.querySelector("body").addEventListener("click", () => {
            alert("Body Was Clicked")
        })

        // SET RANDOM COLOR ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
        function getRandomColor() {
            let val1 = Math.ceil(0 + Math.random() * 255);
            let val2 = Math.ceil(0 + Math.random() * 255);
            let val3 = Math.ceil(0 + Math.random() * 255);
            return `rgb(${val1},${val2},${val3})`
        }

        // SET INTERVAL ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
         let a = setInterval(() => {
             document.querySelector(".container").style.backgroundColor = getRandomColor()
         }, 1000);
         console.log(a)

        // SET TIMEOUT ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
        let b =setTimeout(() => {
            document.querySelector("body").style.backgroundColor = getRandomColor()
        }, 1000);
        console.log(b)
    </script>
</body>

</html>
